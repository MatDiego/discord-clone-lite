framework:
    rate_limiter:
        registration:
            policy: sliding_window
            limit: 3
            interval: '15 minutes'
            cache_pool: cache.rate_limiter

        chat_message:
            policy: sliding_window
            limit: 20
            interval: '1 minute'
            cache_pool: cache.rate_limiter

        server_invitation:
            policy: sliding_window
            limit: 10
            interval: '10 minutes'
            cache_pool: cache.rate_limiter
