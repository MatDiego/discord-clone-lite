name: CI/CD Pipeline

on:
    push:
        branches: [ "master", "dev" ]
    pull_request:
        branches: [ "master", "dev" ]
    workflow_dispatch:

jobs:
    psalm:
        name: "Psalm"
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.3'
                    extensions: pdo_pgsql, intl, opcache, zip, xsl
                    coverage: none

            -   name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: vendor
                    key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -   name: Install Composer dependencies
                run: composer install --prefer-dist --no-interaction --no-progress

            -   name: Run Psalm
                run: vendor/bin/psalm --no-progress --output-format=github

    tests:
        name: "PHPUnit Tests"
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: app_test
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: secret
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -d app_test -U app"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        env:
            APP_ENV: test
            APP_SECRET: '$ecretf0rt3st'
            DATABASE_URL: "postgresql://app:secret@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8"
            MERCURE_URL: "http://localhost/.well-known/mercure"
            MERCURE_HUB_URL: "http://localhost/.well-known/mercure"
            MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
            MERCURE_JWT_SECRET: "test-secret-key-for-ci-only-32ch"

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.3'
                    extensions: pdo_pgsql, intl, opcache, zip, xsl
                    coverage: none

            -   name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: vendor
                    key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -   name: Install Composer dependencies
                run: composer install --prefer-dist --no-interaction --no-progress

            -   name: Download UX Icons (if not committed)
                run: php bin/console ux:icons:lock --no-interaction

            -   name: Cache Dart Sass binary
                uses: actions/cache@v4
                with:
                    path: var/sass
                    key: ${{ runner.os }}-dart-sass-${{ hashFiles('composer.lock') }}

            -   name: Build SASS assets
                run: php bin/console sass:build

            -   name: Create test database and run migrations
                run: |
                    php bin/console doctrine:database:create --if-not-exists
                    php bin/console doctrine:migrations:migrate --no-interaction

            -   name: Run PHPUnit
                run: vendor/bin/phpunit --testdox

    deploy:
        name: "Deploy on VPS"
        runs-on: ubuntu-latest
        needs: [psalm, tests]

        if: github.ref == 'refs/heads/master'

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Copy files to VPS via SCP
                uses: appleboy/scp-action@v0.1.7
                with:
                    host: ${{ secrets.SERVER_IP }}
                    username: ${{ secrets.SERVER_USER }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    source: "./"
                    target: "/opt/discord-clone"

            -   name: Build and Deploy on VPS via SSH
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.SERVER_IP }}
                    username: ${{ secrets.SERVER_USER }}
                    key: ${{ secrets.SSH_PRIVATE_KEY }}
                    script: |
                        set -e
                        cd /opt/discord-clone

                        echo "APP_ENV=prod" > .env.local
                        echo "DOMAIN_NAME=matnas.pl" >> .env.local
                        echo "DEFAULT_URI=https://matnas.pl" >> .env.local
                        echo "CORS_ALLOWED_ORIGINS=^https?://(www\.)?matnas\.pl$" >> .env.local

                        echo "POSTGRES_DB=communicator_prod" >> .env.local
                        echo "POSTGRES_USER=postgres" >> .env.local
                        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.local
                        echo "DATABASE_URL=postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@database:5432/communicator_prod?serverVersion=16&charset=utf8" >> .env.local

                        echo "SYMFONY_DECRYPTION_SECRET=${{ secrets.SYMFONY_DECRYPTION_SECRET }}" >> .env.local
                        echo "MERCURE_JWT_SECRET=${{ secrets.MERCURE_JWT_SECRET }}" >> .env.local

                        echo "MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0" >> .env.local
                        echo "MAILER_DSN=null://null" >> .env.local

                        echo "MERCURE_URL=http://localhost:8080/.well-known/mercure" >> .env.local
                        echo "MERCURE_PUBLIC_URL=https://matnas.pl/.well-known/mercure" >> .env.local
                        echo "MERCURE_HUB_URL=http://localhost:8080/.well-known/mercure" >> .env.local

                        export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
                        export MERCURE_JWT_SECRET="${{ secrets.MERCURE_JWT_SECRET }}"
                        export SYMFONY_DECRYPTION_SECRET="${{ secrets.SYMFONY_DECRYPTION_SECRET }}"

                        docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --wait

                        docker compose -f docker-compose.prod.yml exec -T frankenphp \
                          php bin/console doctrine:migrations:migrate --no-interaction

                        docker image prune -f
