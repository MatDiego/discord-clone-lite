services:
    frankenphp:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped

        environment:
            APP_ENV: prod
            DOMAIN_NAME: matnas.pl
            DEFAULT_URI: https://matnas.pl

            POSTGRES_DB: communicator_prod
            POSTGRES_USER: postgres
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/communicator_prod?serverVersion=16&charset=utf8

            SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}

            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            MERCURE_URL: http://localhost:8080/.well-known/mercure
            MERCURE_PUBLIC_URL: https://matnas.pl/.well-known/mercure
            MERCURE_HUB_URL: http://localhost:8080/.well-known/mercure
            MAILER_DSN: ${MAILER_DSN}

            REDIS_DSN: redis://redis:6379
            MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
            SESSION_LIFETIME: 600

        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy

    demo-reset:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        command: /usr/local/bin/demo-reset-loop.sh
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'demo-reset-loop.sh' || pgrep sleep"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        environment:
            APP_ENV: prod
            REDIS_DSN: redis://redis:6379
            SESSION_LIFETIME: 600
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            MERCURE_URL: http://frankenphp:8080/.well-known/mercure
            MERCURE_PUBLIC_URL: https://matnas.pl/.well-known/mercure
            MERCURE_HUB_URL: http://frankenphp:8080/.well-known/mercure
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/communicator_prod?serverVersion=16&charset=utf8
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
            frankenphp:
                condition: service_started

    messenger-worker:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M
        healthcheck:
            test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'messenger:consume' || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        environment:
            APP_ENV: prod
            REDIS_DSN: redis://redis:6379
            MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
            MAILER_DSN: ${MAILER_DSN}
            SESSION_LIFETIME: 600
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            MERCURE_URL: http://frankenphp:8080/.well-known/mercure
            MERCURE_PUBLIC_URL: https://matnas.pl/.well-known/mercure
            MERCURE_HUB_URL: http://frankenphp:8080/.well-known/mercure
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/communicator_prod?serverVersion=16&charset=utf8
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
            frankenphp:
                condition: service_started

    cleanup-unverified:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        command: sh -c 'while true; do php bin/console app:users:cleanup --max-age=60 --no-interaction; sleep 600; done'
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'users:cleanup' || pgrep sleep"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
        environment:
            APP_ENV: prod
            REDIS_DSN: redis://redis:6379
            MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
            MAILER_DSN: ${MAILER_DSN}
            SESSION_LIFETIME: 600
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            MERCURE_URL: http://frankenphp:8080/.well-known/mercure
            MERCURE_PUBLIC_URL: https://matnas.pl/.well-known/mercure
            MERCURE_HUB_URL: http://frankenphp:8080/.well-known/mercure
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/communicator_prod?serverVersion=16&charset=utf8
        depends_on:
            database:
                condition: service_healthy
            frankenphp:
                condition: service_started

    session-monitor:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        command: php bin/console app:session:monitor
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'session:monitor'"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
        environment:
            APP_ENV: prod
            REDIS_DSN: redis://redis:6379
            SESSION_LIFETIME: 600
            MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
            MERCURE_URL: http://frankenphp:8080/.well-known/mercure
            MERCURE_PUBLIC_URL: https://matnas.pl/.well-known/mercure
            MERCURE_HUB_URL: http://frankenphp:8080/.well-known/mercure
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/communicator_prod?serverVersion=16&charset=utf8
        depends_on:
            redis:
                condition: service_healthy
            frankenphp:
                condition: service_started

    database:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: communicator_prod
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d communicator_prod"]
            interval: 5s
            timeout: 5s
            retries: 5
        volumes:
            - database_data_prod:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: redis-server /usr/local/etc/redis/redis.conf
        volumes:
            - redis_data_prod:/data
            - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    database_data_prod:
    caddy_data:
    caddy_config:
    redis_data_prod:
