services:
    frankenphp:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped

        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            database:
                condition: service_healthy

    database:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: communicator_prod
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d communicator_prod"]
            interval: 5s
            timeout: 5s
            retries: 5
        volumes:
            - database_data_prod:/var/lib/postgresql/data


volumes:
    database_data_prod:
    caddy_data:
    caddy_config:
